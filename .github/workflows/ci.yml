name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t ci-demo-app .

  smoke-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t ci-demo-app .

      - name: Start Container
        run: |
          docker run -d -p 5000:5000 --name ci-demo-container ci-demo-app

      - name: Wait for Application
        run: sleep 5

      - name: Verify Application
        run: |
          curl --fail http://localhost:5000

      - name: Show Container Logs
        if: always()
        run: docker logs ci-demo-container

      - name: Stop Container
        if: always()
        run: docker stop ci-demo-container

      - name: Remove Container
        if: always()
        run: docker rm ci-demo-container